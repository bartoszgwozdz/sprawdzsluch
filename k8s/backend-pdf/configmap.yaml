apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-pdf-config
  namespace: sprawdzsluch
data:
  # Server Configuration
  PORT: "3001"
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  MONGODB_DATABASE: "sprawdzsluch"
  
  # Email Configuration (SMTP)
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  EMAIL_FROM: "noreply@sprawdzsluch.pl"
  EMAIL_SUBJECT: "Twoj raport z testu sluchu - SprawdzSluch"

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-pdf-secret
  namespace: sprawdzsluch
type: Opaque
stringData:
  MONGODB_URI: mongodb://admin:supersecret@mongodb:27017/sprawdzsluch?authSource=admin
  SMTP_USER: replace-with-smtp-user
  SMTP_PASSWORD: replace-with-smtp-password