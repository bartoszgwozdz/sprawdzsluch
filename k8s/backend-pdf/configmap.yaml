apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-pdf-config
  namespace: sprawdzsluch
data:
  # Server Configuration
  PORT: "3001"
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  
  # MongoDB Configuration
  MONGODB_URI: "mongodb://admin:supersecret@mongodb:27017/sprawdzsluch?authSource=admin"
  MONGODB_DATABASE: "sprawdzsluch"
  
  # Email Configuration (SMTP)
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  EMAIL_FROM: "noreply@sprawdzsluch.pl"
  EMAIL_SUBJECT: "Twoj raport z testu sluchu - SprawdzSluch"

  # SMTP credentials - zastąp właściwymi danymi lub użyj Secretu ręcznie
  SMTP_USER: ""
  SMTP_PASSWORD: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-pdf-secret
  namespace: sprawdzsluch
type: Opaque
data:
  # Email credentials (base64 encoded)
  # Należy zastąpić właściwymi danymi
  SMTP_USER: eW91ci1lbWFpbEBnbWFpbC5jb20=           # your-email@gmail.com
  SMTP_PASSWORD: eW91ci1hcHAtcGFzc3dvcmQ=            # your-app-password
  
  # MongoDB credentials (if needed)
  MONGODB_USERNAME: c3ByYXdkemVzbHVjaA==             # sprawdzesprach
  MONGODB_PASSWORD: c2VjdXJlUGFzcw==                # securePass