apiVersion: v1
kind: Service
metadata:
  name: backend-pdf-service
  namespace: sprawdzsluch
  labels:
    app: backend-pdf
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
  selector:
    app: backend-pdf

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-pdf-network-policy
  namespace: sprawdzsluch
spec:
  podSelector:
    matchLabels:
      app: backend-pdf
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow health checks from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: traefik-system
      ports:
        - protocol: TCP
          port: 3001
    
    # Allow payment-completed requests from backend-payments
    - from:
        - podSelector:
            matchLabels:
              app: backend-payments
      ports:
        - protocol: TCP
          port: 3001
  
  egress:
    # Allow connection to MongoDB
    - to:
        - podSelector:
            matchLabels:
              app: mongodb
      ports:
        - protocol: TCP
          port: 27017
    
    # Allow SMTP connections (Gmail)
    - to: []
      ports:
        - protocol: TCP
          port: 587
        - protocol: TCP
          port: 465
        - protocol: TCP
          port: 25
    
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
    
    # Allow HTTPS for external dependencies
    - to: []
      ports:
        - protocol: TCP
          port: 443

