---
# BACKEND-CORE API — ścieżka natywna /api/results
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sprawdzsluch-backend-core
  namespace: sprawdzsluch
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/api/results`)
      kind: Rule
      services:
        - name: backend-core
          port: 8090
      middlewares:
        - name: add-headers
        - name: rate-limit-core

---
# BACKEND-CORE API — alias /api/hearing-test (używany przez frontend)
# Przepisuje /api/hearing-test/* → /api/results/*
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sprawdzsluch-backend-core-alias
  namespace: sprawdzsluch
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/api/hearing-test`)
      kind: Rule
      services:
        - name: backend-core
          port: 8090
      middlewares:
        - name: rewrite-hearing-test-path
        - name: add-headers
        - name: rate-limit-core

---
# Middleware — przepisuje /api/hearing-test → /api/results
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rewrite-hearing-test-path
  namespace: sprawdzsluch
spec:
  replacePathRegex:
    regex: ^/api/hearing-test(.*)
    replacement: /api/results${1}

---
# BACKEND-PAYMENTS API — ścieżka natywna /api/v1/payments i /api/v1/vouchers
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sprawdzsluch-backend-payments
  namespace: sprawdzsluch
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/api/v1/payments`) || PathPrefix(`/api/v1/vouchers`)
      kind: Rule
      services:
        - name: backend-payments
          port: 8081
      middlewares:
        - name: add-headers
        - name: rate-limit-payments

---
# BACKEND-PAYMENTS API — alias /api/payments (używany przez frontend)
# Przepisuje /api/payments/* → /api/v1/payments/*
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sprawdzsluch-backend-payments-alias
  namespace: sprawdzsluch
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/api/payments`)
      kind: Rule
      services:
        - name: backend-payments
          port: 8081
      middlewares:
        - name: rewrite-payments-path
        - name: add-headers
        - name: rate-limit-payments

---
# Middleware — przepisuje /api/payments → /api/v1/payments
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rewrite-payments-path
  namespace: sprawdzsluch
spec:
  replacePathRegex:
    regex: ^/api/payments(.*)
    replacement: /api/v1/payments${1}

---
# BACKEND-PDF API
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sprawdzsluch-backend-pdf
  namespace: sprawdzsluch
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/api/v1/pdf`) || PathPrefix(`/api/v1/email`) || Path(`/health`)
      kind: Rule
      services:
        - name: backend-pdf
          port: 3000
      middlewares:
        - name: add-headers
        - name: rate-limit-pdf

---
# FRONTEND
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sprawdzsluch-frontend
  namespace: sprawdzsluch
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      priority: 1
      services:
        - name: frontend
          port: 80
          passHostHeader: true
      middlewares:
        - name: add-headers

---
# Headers middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: add-headers
  namespace: sprawdzsluch
spec:
  headers:
    customRequestHeaders:
      X-Original-URI: "{path}"
      X-Original-Method: "{method}"
    customResponseHeaders:
      Access-Control-Allow-Origin: "*"
      Access-Control-Allow-Methods: "GET, POST, PUT, DELETE, OPTIONS"
      Access-Control-Allow-Headers: "Content-Type, Authorization, X-Requested-With"

---
# Rate limiting for Core API
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit-core
  namespace: sprawdzsluch
spec:
  rateLimit:
    average: 100
    burst: 200
    period: 1m

---
# Rate limiting for Payments API
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit-payments
  namespace: sprawdzsluch
spec:
  rateLimit:
    average: 50
    burst: 100
    period: 1m

---
# Rate limiting for PDF API
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit-pdf
  namespace: sprawdzsluch
spec:
  rateLimit:
    average: 30
    burst: 60
    period: 1m

---
# Circuit breaker middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: circuit-breaker
  namespace: sprawdzsluch
spec:
  circuitBreaker:
    expression: "NetworkErrorRatio() > 0.30 || ResponseCodeRatio(500, 600, 0, 600) > 0.25"