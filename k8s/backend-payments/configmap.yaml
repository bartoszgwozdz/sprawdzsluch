apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-payments-config
  namespace: sprawdzsluch
data:
  # Server Configuration
  SERVER_PORT: "8082"
  
  # Service URLs (HTTP zamiast Kafka)
  SERVICES_PDF_URL: "http://backend-pdf-service:3001"
  
  # MongoDB Configuration
  SPRING_DATA_MONGODB_HOST: "mongodb-service"
  SPRING_DATA_MONGODB_PORT: "27017"
  SPRING_DATA_MONGODB_DATABASE: "sprawdzsluch"
  
  # Application Configuration
  SPRING_PROFILES_ACTIVE: "production"
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_DEV_GWOZDZ: "DEBUG"

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-payments-secret
  namespace: sprawdzsluch
type: Opaque
data:
  # MongoDB credentials (base64 encoded)
  SPRING_DATA_MONGODB_USERNAME: c3ByYXdkemVzbHVjaA==  # sprawdzesprach
  SPRING_DATA_MONGODB_PASSWORD: c2VjdXJlUGFzcw==      # securePass
  
  # Voucher codes (base64 encoded) - przykładowe vouchery
  VOUCHER_CODES: Vk9VQ0hFUjIwMjQsRlJFRVJFUE9SVCxURVNUU0xVQ0gsUFJPTU9DSkE1MA==