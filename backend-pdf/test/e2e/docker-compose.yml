# Lokalne środowisko e2e dla backend-pdf.
# Uruchamia tylko infrastrukturę (MongoDB + Mailpit). Sam serwis backend-pdf
# startuje run-e2e.sh lokalnie (node), żeby testować dokładnie kod z repo.
#
#   MongoDB  -> przechowuje hearing_results / processed_pdf_events
#   Mailpit  -> łapie wychodzące maile (SMTP :1025) i wystawia API/UI (:8025)
#
# Start ręczny:  docker compose -f docker-compose.yml up -d
# UI Mailpit:    http://localhost:8025

services:
  mongo-e2e:
    image: mongo:7
    container_name: sprawdzsluch-pdf-e2e-mongo
    ports:
      - "27018:27017"          # 27018 lokalnie, by nie kolidować z lokalnym mongo
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 3s
      timeout: 5s
      retries: 20
    tmpfs:
      - /data/db              # baza w RAM — czysty stan przy każdym restarcie

  mailpit-e2e:
    image: axllent/mailpit:latest
    container_name: sprawdzsluch-pdf-e2e-mailpit
    ports:
      - "1025:1025"            # SMTP
      - "8025:8025"            # HTTP API + UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8025/readyz"]
      interval: 3s
      timeout: 5s
      retries: 20
