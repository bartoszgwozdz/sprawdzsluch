# Konfiguracja PRODUCTION dla backend-payments
spring.application.name=backend-payments
server.port=8082

# MongoDB - URI pobierane z Kubernetes ConfigMap
# spring.data.mongodb.uri zostanie nadpisane przez zmienne środowiskowe

# URL serwisu PDF (K8s service name)
services.pdf.url=${SERVICES_PDF_URL:http://backend-pdf-service:3001}

# PayNow - produkcyjne API
paynow.apiKey=${PAYNOW_API_KEY:your_api_key}
paynow.signatureKey=${PAYNOW_SIGNATURE_KEY:your_signature_key}
paynow.apiUrl=https://paynow.pl/v1
paynow.redirectUrl=${PAYNOW_REDIRECT_URL:https://sprawdzsluch.pl/payment/return}
paynow.notifyUrl=${PAYNOW_NOTIFY_URL:https://sprawdzsluch.pl/api/paynow/webhook}

# Logging
logging.level.root=INFO
logging.level.dev.gwozdz.sprawdzsluch.payments=INFO
